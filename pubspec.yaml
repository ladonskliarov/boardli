name: boardli
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  bloc: ^9.2.0
  dartz: ^0.10.1
  dio: ^5.9.2
  easy_localization: ^3.0.8
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_markdown: ^0.7.7+1
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.4
  get_it: ^9.2.1
  go_router: ^17.1.0
  meta: ^1.17.0
  provider: ^6.1.5+1
  responsive_sizer: ^3.3.1
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/translations/
  
  fonts: 
  - family: e-Ukraine
    fonts: 
      - asset: assets/fonts/e-Ukraine-UltraLight.otf
        weight: 100
      - asset: assets/fonts/e-Ukraine-Thin.otf
        weight: 200
      - asset: assets/fonts/e-Ukraine-Light.otf
        weight: 300
      - asset: assets/fonts/e-Ukraine-Regular.otf
        weight: 400
      - asset: assets/fonts/e-Ukraine-Medium.otf
        weight: 500
      - asset: assets/fonts/e-Ukraine-Bold.otf
        weight: 700
        